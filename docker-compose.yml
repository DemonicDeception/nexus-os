version: '3.8'

services:
  nexus-os:
    build: .
    container_name: nexus-os
    ports:
      - "5900:5900"   # VNC
      - "6080:6080"   # noVNC (browser)
      - "8888:8888"   # NexusOS API (future)
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DISPLAY=:1
      - RESOLUTION=1920x1080x24
    volumes:
      # Share files between Windows and NexusOS
      - nexus-home:/home/nexus
      - ./shared:/home/nexus/shared
    shm_size: '2gb'  # Needed for browser/apps
    restart: unless-stopped

volumes:
  nexus-home:
